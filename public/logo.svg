<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440" fill="none" aria-label="DeepNode Industries Logo">
  <defs>
    <!-- Metallic silver-blue gradient for DN letters -->
    <linearGradient id="metallic-dn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4e8ff"/>
      <stop offset="25%" stop-color="#a8c8f0"/>
      <stop offset="55%" stop-color="#6090d0"/>
      <stop offset="80%" stop-color="#4070b8"/>
      <stop offset="100%" stop-color="#2850a0"/>
    </linearGradient>
    <!-- Side highlight for 3D effect -->
    <linearGradient id="metallic-side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c0d8f8"/>
      <stop offset="100%" stop-color="#5080c8"/>
    </linearGradient>
    <!-- Neon cyan-purple gradient for network -->
    <linearGradient id="neon-net" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c8ff"/>
      <stop offset="60%" stop-color="#4050e0"/>
      <stop offset="100%" stop-color="#8030d0"/>
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9ab8e8"/>
      <stop offset="50%" stop-color="#6090d8"/>
      <stop offset="100%" stop-color="#4060c8"/>
    </linearGradient>
    <!-- Glow filter for nodes -->
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glow filter for lines -->
    <filter id="line-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Letter glow -->
    <filter id="letter-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Drop shadow for letters -->
    <filter id="letter-shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="4" dy="5" stdDeviation="4" flood-color="#001840" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- ═══ NEURAL NETWORK ═══ -->
  <!-- Nodes positions (hexagonal pattern) -->
  <!-- Top: (200, 28) | UL: (92, 90) | UR: (308, 90) | L: (50, 195) | R: (350, 195) | LL: (92, 300) | LR: (308, 300) | Bot: (200, 362) -->

  <!-- Connection lines (glow filter) -->
  <g filter="url(#line-glow)" opacity="0.75">
    <!-- Outer hex edges -->
    <line x1="200" y1="28" x2="92" y2="90" stroke="url(#neon-net)" stroke-width="1.5"/>
    <line x1="200" y1="28" x2="308" y2="90" stroke="url(#neon-net)" stroke-width="1.5"/>
    <line x1="92" y1="90" x2="50" y2="195" stroke="url(#neon-net)" stroke-width="1.5"/>
    <line x1="308" y1="90" x2="350" y2="195" stroke="url(#neon-net)" stroke-width="1.5"/>
    <line x1="50" y1="195" x2="92" y2="300" stroke="#5040d8" stroke-width="1.5"/>
    <line x1="350" y1="195" x2="308" y2="300" stroke="#5040d8" stroke-width="1.5"/>
    <line x1="92" y1="300" x2="200" y2="362" stroke="#6030c0" stroke-width="1.5"/>
    <line x1="308" y1="300" x2="200" y2="362" stroke="#6030c0" stroke-width="1.5"/>
    <!-- Inner diagonals -->
    <line x1="92" y1="90" x2="308" y2="300" stroke="#3840b0" stroke-width="1" opacity="0.5"/>
    <line x1="308" y1="90" x2="92" y2="300" stroke="#3840b0" stroke-width="1" opacity="0.5"/>
    <line x1="200" y1="28" x2="200" y2="362" stroke="#2030a0" stroke-width="1" opacity="0.35"/>
    <line x1="50" y1="195" x2="350" y2="195" stroke="#2030a0" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- Node circles -->
  <g filter="url(#node-glow)">
    <!-- Top center -->
    <circle cx="200" cy="28" r="7" fill="#0a0f20" stroke="#00c8ff" stroke-width="2.5"/>
    <circle cx="200" cy="28" r="2.5" fill="#00d8ff"/>
    <!-- Upper left -->
    <circle cx="92" cy="90" r="6" fill="#0a0f20" stroke="#18b0ff" stroke-width="2"/>
    <circle cx="92" cy="90" r="2" fill="#20c0ff"/>
    <!-- Upper right -->
    <circle cx="308" cy="90" r="6" fill="#0a0f20" stroke="#18b0ff" stroke-width="2"/>
    <circle cx="308" cy="90" r="2" fill="#20c0ff"/>
    <!-- Middle left -->
    <circle cx="50" cy="195" r="6" fill="#0a0f20" stroke="#3878ff" stroke-width="2"/>
    <circle cx="50" cy="195" r="2" fill="#4088ff"/>
    <!-- Middle right -->
    <circle cx="350" cy="195" r="6" fill="#0a0f20" stroke="#3878ff" stroke-width="2"/>
    <circle cx="350" cy="195" r="2" fill="#4088ff"/>
    <!-- Lower left -->
    <circle cx="92" cy="300" r="6" fill="#0a0f20" stroke="#6040d8" stroke-width="2"/>
    <circle cx="92" cy="300" r="2" fill="#7050e0"/>
    <!-- Lower right -->
    <circle cx="308" cy="300" r="6" fill="#0a0f20" stroke="#6040d8" stroke-width="2"/>
    <circle cx="308" cy="300" r="2" fill="#7050e0"/>
    <!-- Bottom center -->
    <circle cx="200" cy="362" r="7" fill="#0a0f20" stroke="#8030c8" stroke-width="2.5"/>
    <circle cx="200" cy="362" r="2.5" fill="#9040d8"/>
  </g>

  <!-- ═══ DN LETTERS ═══ -->
  <!-- Shadow/3D extrude effect (offset copies) -->
  <g filter="url(#letter-shadow)" transform="translate(0,0)">
    <!-- D letter — outer shape -->
    <path d="M68 98 L68 295 L152 295 Q230 295 230 196 Q230 98 152 98 Z
             M108 135 L148 135 Q188 135 188 196 Q188 258 148 258 L108 258 Z"
          fill="#1040a8" opacity="0.6"/>
    <!-- N letter -->
    <path d="M248 98 L248 295 L290 295 L290 175 L330 295 L370 295 L370 98 L328 98 L328 220 L288 98 Z"
          fill="#1040a8" opacity="0.6"/>
  </g>

  <!-- Main D letter -->
  <path d="M65 95 L65 298 L150 298 Q232 298 232 196 Q232 95 150 95 Z
           M106 133 L148 133 Q190 133 190 196 Q190 260 148 260 L106 260 Z"
        fill="url(#metallic-dn)" filter="url(#letter-glow)"/>
  <!-- D highlight edge (3D left face) -->
  <rect x="65" y="95" width="12" height="203" fill="url(#metallic-side)" opacity="0.7"/>

  <!-- Main N letter -->
  <path d="M245 95 L245 298 L288 298 L288 178 L328 298 L372 298 L372 95 L329 95 L329 218 L289 95 Z"
        fill="url(#metallic-dn)" filter="url(#letter-glow)"/>
  <!-- N highlight edges (3D effect) -->
  <rect x="245" y="95" width="11" height="203" fill="url(#metallic-side)" opacity="0.6"/>
  <rect x="361" y="95" width="11" height="203" fill="url(#metallic-side)" opacity="0.5"/>

  <!-- ═══ WORDMARK TEXT ═══ -->
  <!-- DEEPNODE -->
  <text
    x="200" y="400"
    text-anchor="middle"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="38"
    font-weight="900"
    letter-spacing="8"
    fill="url(#text-grad)"
  >DEEPNODE</text>

  <!-- Decorative lines flanking INDUSTRIES -->
  <line x1="30" y1="426" x2="110" y2="426" stroke="#4050a8" stroke-width="1" opacity="0.7"/>
  <line x1="290" y1="426" x2="370" y2="426" stroke="#4050a8" stroke-width="1" opacity="0.7"/>

  <!-- INDUSTRIES -->
  <text
    x="200" y="432"
    text-anchor="middle"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-size="14"
    font-weight="400"
    letter-spacing="6"
    fill="#6080b8"
    opacity="0.9"
  >INDUSTRIES</text>
</svg>
